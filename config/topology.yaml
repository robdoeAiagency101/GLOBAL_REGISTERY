# Local host config
host:
  name: "local"
  hostname: "localhost"
  os: "windows"
  terminal: "windows-terminal"
  shell: "pwsh"
  docker_host: "unix:///var/run/docker.sock"

# Modes (task contexts)
modes:
  dev:
    name: "Development"
    emoji: "👤"
    env_vars:
      MODE: "dev"
      LOGLEVEL: "debug"
    aliases:
      - "cdengine: Set-Location C:\\Users\\Admin\\OneDrive\\Desktop\\(   .  Y  .    )ENGINE"
      - "build: docker compose -f docker-compose-14engines.yml build"
      - "up: docker compose -f docker-compose-14engines.yml up -d"
      - "ps: docker ps -f label=lock=90day-sync"
      - "logs: docker compose -f docker-compose-14engines.yml logs -f"

  ops:
    name: "Operations"
    emoji: "🔧"
    env_vars:
      MODE: "ops"
      LOGLEVEL: "info"
    aliases:
      - "health: gtop status"
      - "restart: docker compose -f docker-compose-14engines.yml restart"
      - "prune: docker system prune -f"
      - "inspect: docker inspect"

  audit:
    name: "Audit"
    emoji: "🔍"
    env_vars:
      MODE: "audit"
      LOGLEVEL: "warn"
    aliases:
      - "lock-status: bash ./lock-status.sh"
      - "verify-lock: cat lock-metadata.json | ConvertFrom-Json"
      - "traces: curl -s http://localhost:365/4gr/traces | ConvertFrom-Json"

  experiment:
    name: "Experiment"
    emoji: "🧪"
    env_vars:
      MODE: "experiment"
      LOGLEVEL: "debug"
    aliases:
      - "test-ping: curl -X POST http://localhost:365/4gr/ping -d '{\"id\":\"test\",\"signal\":\"ping\"}'"
      - "test-cycle: curl -X POST http://localhost:365/4gr/cycle"
